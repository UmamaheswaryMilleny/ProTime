services:
  backend:
    build:
      context: ./server
    container_name: protime-backend
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env

  frontend:
    build:
      context: ./client
    container_name: protime-client
    ports:
      - "5173:5173"
    depends_on:
      - backend